<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-Student Section Splitter</title>
    <style>
        :root { --primary: #0078d4; --bg: #f3f2f1; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Input Area */
        #inputBox { 
            background: white; border: 2px solid #deecf9; border-radius: 4px;
            padding: 20px; min-height: 250px; margin-bottom: 20px;
            overflow-y: auto; outline: none;
        }
        #inputBox:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,120,212,0.2); }
        #inputBox:empty:before { content: "Paste your entire document here (images, bullets, and all)..."; color: #a19f9d; }

        .btn-main { 
            background: var(--primary); color: white; border: none; padding: 15px 30px; 
            font-size: 18px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;
            margin-bottom: 30px; transition: background 0.2s;
        }
        .btn-main:hover { background: #106ebe; }

        /* Output Cards */
        .section-card { 
            background: var(--card); border-radius: 8px; margin-bottom: 25px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 5px solid var(--primary);
        }
        .section-header { 
            padding: 12px 20px; background: #faf9f8; border-bottom: 1px solid #edebe9;
            display: flex; justify-content: space-between; align-items: center;
            border-top-right-radius: 8px;
        }
        .section-title { font-weight: bold; color: #323130; }
        .copy-btn { 
            background: #107c10; color: white; border: none; padding: 8px 15px; 
            border-radius: 4px; cursor: pointer; font-weight: 600;
        }
        .copy-btn:hover { background: #0b5a0b; }
        .section-content { padding: 20px; max-height: 500px; overflow-y: auto; }

        /* Ensure images inside cards don't break the layout */
        .section-content img { max-width: 100%; height: auto; border-radius: 4px; display: block; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Study Material Splitter</h1>
    <p>Paste content below. It will split by <strong>SECTION X:</strong> markers while keeping images and formatting.</p>

    <div id="inputBox" contenteditable="true"></div>
    <button class="btn-main" onclick="processContent()">Split Sections</button>

    <div id="output"></div>
</div>

<script>
    function processContent() {
        const input = document.getElementById('inputBox');
        const output = document.getElementById('output');
        output.innerHTML = ''; 

        // Split HTML by "SECTION [number]" - using a regex that looks for 
        // the text pattern but maintains the HTML tags around it.
        const rawHTML = input.innerHTML;
        
        // This regex looks for the word SECTION followed by digits and a colon or space
        // It uses a delimiter strategy to split the string but keep the headers
        const parts = rawHTML.split(/(?=SECTION\s+\d+[:\s])/i);

        parts.forEach((content, index) => {
            if (content.trim().length < 10) return; // Skip empty fragments

            // Extract a title for the card header
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            const titleText = tempDiv.textContent.split('\n')[0].substring(0, 60) + "...";

            createCard(titleText, content, index);
        });
    }

    function createCard(title, html, index) {
        const output = document.getElementById('output');
        const cardId = `content-${index}`;

        const card = document.createElement('div');
        card.className = 'section-card';
        card.innerHTML = `
            <div class="section-header">
                <span class="section-title">${title}</span>
                <button class="copy-btn" onclick="copyToClipboard('${cardId}')">📋 Copy to OneNote</button>
            </div>
            <div id="${cardId}" class="section-content" contenteditable="true">
                ${html}
            </div>
        `;
        output.appendChild(card);
    }

    function copyToClipboard(elementId) {
        const el = document.getElementById(elementId);
        
        // High-fidelity copy: selects the actual HTML nodes
        // This is what allows OneNote to see it as "Rich Text" + Images
        const range = document.createRange();
        range.selectNodeContents(el);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        try {
            document.execCommand('copy');
            const btn = el.parentElement.querySelector('.copy-btn');
            const oldText = btn.innerText;
            btn.innerText = "✅ Ready to Paste!";
            setTimeout(() => btn.innerText = oldText, 2000);
        } catch (err) {
            alert("Copy failed. Please select and copy manually.");
        }
        selection.removeAllRanges();
    }
</script>

</body>
</html>
