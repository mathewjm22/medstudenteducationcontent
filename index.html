<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Clinical Splitter</title>
    <style>
        :root {
            --primary: #2b5797; 
            --success: #107c10; 
            --bg: #f3f2f1;
            --border: #d2d0ce;
        }

        body {
            font-family: "Segoe UI", -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1100px; }

        header { text-align: center; margin-bottom: 20px; }
        header h1 { color: var(--primary); margin: 0; }

        #inputBox {
            background: white;
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            outline: none;
            margin-bottom: 15px;
        }
        #inputBox:empty:before { content: "Paste content here..."; color: #a19f9d; }

        .controls { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 4px;
            font-weight: 600; cursor: pointer; font-size: 16px;
        }
        .btn-split { background: var(--primary); color: white; }
        .btn-clear { background: #edebe9; color: #323130; }

        .section-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .section-header {
            background: #faf9f8;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-header span { font-weight: bold; color: var(--primary); }

        .copy-btn {
            background: var(--success); color: white; border: none;
            padding: 6px 12px; border-radius: 4px; cursor: pointer;
        }

        /* COMPACT SPACING LOGIC */
        .section-content { 
            padding: 15px 20px; 
            line-height: 1.4; 
            color: #323130;
        }

        /* Reset margins on all elements to prevent double-spacing in OneNote */
        .section-content p, 
        .section-content ul, 
        .section-content ol, 
        .section-content li,
        .section-content h1,
        .section-content h2,
        .section-content h3 {
            margin-top: 0 !important;
            margin-bottom: 2px !important; /* Tiny gap for readability, prevents double-space */
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }

        .section-content ul, .section-content ol {
            padding-left: 20px !important;
        }

        .section-content img { max-width: 100%; height: auto; display: block; margin: 5px 0; }
        
        .section-content table { border-collapse: collapse; width: 100%; margin: 10px 0; border: 1px solid #edebe9; }
        .section-content th, .section-content td { border: 1px solid #edebe9; padding: 4px 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Clinical Splitter (Compact)</h1>
    </header>

    <div id="inputBox" contenteditable="true"></div>

    <div class="controls">
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn btn-split" onclick="processSections()">Clean & Split</button>
    </div>

    <div id="outputArea"></div>
</div>

<script>
    function clearAll() {
        document.getElementById('inputBox').innerHTML = '';
        document.getElementById('outputArea').innerHTML = '';
    }

    function toTitleCase(str) {
        return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
    }

    function stripCitations(node) {
        const citationRegex = /\[\d+(?:[\s,-]+\d+)*\]/g;
        const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT, null, false);
        let textNode;
        const nodes = [];
        while (textNode = walker.nextNode()) nodes.push(textNode);
        nodes.forEach(n => n.nodeValue = n.nodeValue.replace(citationRegex, ''));
        
        node.querySelectorAll('sup').forEach(sup => {
            if (sup.textContent.trim() === '') sup.remove();
        });
    }

    function processSections() {
        const input = document.getElementById('inputBox');
        const outputArea = document.getElementById('outputArea');
        outputArea.innerHTML = '';

        const workingDiv = document.createElement('div');
        workingDiv.innerHTML = input.innerHTML;

        stripCitations(workingDiv);

        const children = Array.from(workingDiv.childNodes);
        let sections = [];
        let currentBucket = [];
        let currentTitle = "General Information";

        const sectionHeaderRegex = /SECTION\s+\d+[:\s-]*(.*)/i;

        children.forEach((node) => {
            // Ignore "empty" text nodes that just contain whitespace/newlines
            if (node.nodeType === 3 && !node.textContent.trim()) return;

            const text = node.textContent || "";
            const match = text.match(sectionHeaderRegex);

            if (match && node.nodeType === 1) {
                if (currentBucket.length > 0) {
                    sections.push({ title: currentTitle, nodes: [...currentBucket] });
                }
                
                // Extract and Title Case the header
                let rawTitle = match[1].trim();
                currentTitle = toTitleCase(rawTitle);
                
                // Clear bucket (don't add the header node itself to the content)
                currentBucket = []; 
            } else {
                currentBucket.push(node);
            }
        });

        if (currentBucket.length > 0) {
            sections.push({ title: currentTitle, nodes: currentBucket });
        }

        sections.forEach((sec, idx) => renderCard(sec, idx));
    }

    function renderCard(section, index) {
        const output = document.getElementById('outputArea');
        const cardId = `section-${index}`;

        const card = document.createElement('div');
        card.className = 'section-card';
        card.innerHTML = `
            <div class="section-header">
                <span>${section.title}</span>
                <button class="copy-btn" onclick="copyRichText('${cardId}')">📋 Copy for OneNote</button>
            </div>
            <div id="${cardId}" class="section-content" contenteditable="true"></div>
        `;
        
        output.appendChild(card);
        const contentDiv = document.getElementById(cardId);
        
        section.nodes.forEach(node => {
            contentDiv.appendChild(node.cloneNode(true));
        });
    }

    function copyRichText(elementId) {
        const el = document.getElementById(elementId);
        const range = document.createRange();
        range.selectNodeContents(el);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        try {
            document.execCommand('copy');
            const btn = el.parentElement.previousElementSibling.querySelector('.copy-btn');
            btn.innerText = '✅ Copied!';
            setTimeout(() => btn.innerText = '📋 Copy for OneNote', 1500);
        } catch (err) {
            console.error('Copy failed', err);
        }
        selection.removeAllRanges();
    }
</script>

</body>
</html>
