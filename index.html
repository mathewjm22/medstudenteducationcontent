<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Text Section Splitter</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 { color: var(--primary); margin-bottom: 10px; }
        p.instructions { margin-bottom: 20px; color: #64748b; }

        /* Rich Text Areas */
        .editor-box {
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        .editor-box:focus { border-color: var(--primary); }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-bottom: 40px;
        }
        .btn:hover { background: #4338ca; }

        /* Results Styling */
        .section-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .section-header {
            background: #f1f5f9;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .copy-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .copy-btn:hover { background: #059669; }
        
        .section-body {
            padding: 15px;
            min-height: 50px;
        }
        
        /* Placeholder styling */
        [contenteditable]:empty:before {
            content: attr(placeholder);
            color: #94a3b8;
            cursor: text;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Section Splitter</h1>
    <p class="instructions">Paste your formatted text below (images/bullets included). The app will split content wherever it finds "<strong>SECTION X:</strong>".</p>

    <div id="inputBox" class="editor-box" contenteditable="true" placeholder="Paste entire document here..."></div>
    
    <button class="btn" onclick="processContent()">Process & Split Sections</button>

    <div id="resultsArea"></div>
</div>

<script>
    function processContent() {
        const input = document.getElementById('inputBox');
        const resultsArea = document.getElementById('resultsArea');
        resultsArea.innerHTML = ''; // Clear previous

        // We use a temporary div to parse the HTML structure
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = input.innerHTML;

        let sections = [];
        let currentSectionTitle = "Intro / Header";
        let currentContent = "";

        // Iterate through top-level nodes of the pasted content
        const children = Array.from(tempDiv.childNodes);
        
        children.forEach((node) => {
            const textContent = node.textContent || "";
            // Regex to detect "SECTION" followed by numbers and a colon
            const sectionMatch = textContent.match(/SECTION\s+\d+[:\s-]/i);

            if (sectionMatch) {
                // If we find a new section, save the previous one
                if (currentContent.trim() !== "") {
                    sections.push({ title: currentSectionTitle, html: currentContent });
                }
                // Update title to the new section heading
                currentSectionTitle = textContent.trim().substring(0, 100); 
                currentContent = node.outerHTML || node.textContent; // Start new section with this header
            } else {
                // Append current node's HTML to the active section
                currentContent += node.outerHTML || node.nodeValue || "";
            }
        });

        // Push the final section
        if (currentContent.trim() !== "") {
            sections.push({ title: currentSectionTitle, html: currentContent });
        }

        // Display results
        sections.forEach((sec, index) => {
            createSectionCard(sec.title, sec.html, index);
        });
    }

    function createSectionCard(title, html, index) {
        const resultsArea = document.getElementById('resultsArea');
        
        const card = document.createElement('div');
        card.className = 'section-card';
        
        const header = document.createElement('div');
        header.className = 'section-header';
        header.innerHTML = `<span>${title}</span>`;
        
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.innerText = '📋 Copy for OneNote';
        copyBtn.onclick = () => copyToClipboard(`section-body-${index}`);
        
        header.appendChild(copyBtn);
        
        const body = document.createElement('div');
        body.className = 'section-body';
        body.id = `section-body-${index}`;
        body.contentEditable = "true";
        body.innerHTML = html;
        
        card.appendChild(header);
        card.appendChild(body);
        resultsArea.appendChild(card);
    }

    async function copyToClipboard(elementId) {
        const el = document.getElementById(elementId);
        
        // This method is best for preserving Rich Text (HTML) for OneNote
        const range = document.createRange();
        range.selectNode(el);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        try {
            document.execCommand('copy');
            const btn = el.parentElement.querySelector('.copy-btn');
            const originalText = btn.innerText;
            btn.innerText = '✅ Copied!';
            btn.style.background = '#059669';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '#10b981';
            }, 2000);
        } catch (err) {
            alert('Selection failed, please copy manually.');
        }
        selection.removeAllRanges();
    }
</script>

</body>
</html>
